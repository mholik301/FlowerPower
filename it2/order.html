<!DOCTYPE html>
<html>

<head>
    <title>Flower power!</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" type="image/png" href="images/flower-icon.png" />
    <link rel="stylesheet" type="text/css" href="vendor/normalize.css">
    <link rel="stylesheet" type="text/css" href="styles/main.css">
    <meta http-equiv="content-type" content="text/html; charset=utf-8" />
</head>


<body class="content body-header-fixed">
    <header class="header header-fixed primary-color-bg">
        <nav class="navigation container">
            <div class="menu">
                <a href="index.html" class="link menu-item">Home</a>
                <a href="order.html" class="link menu-item link-active">Order</a>
                <a href="index.html" class="link">
                    <img class="scaled-image scaled-image-fixed" src="images/logo.svg" alt="Company logo">
                </a>
                <a href="#" class="link menu-item">Contact us</a>
                <a href="cart.html" class="link menu-item cart-menu">
                    <img src="images/cart-icon.svg" alt="Cart icon">
                    <div class="cart-menu-status">
                        <div id="cart-items">0</div>
                        <div>items</div>
                    </div>
                </a>
            </div>
        </nav>
    </header>

    <main class="main">

    </main>

    <footer class="footer">
        <div class="container">
            <div class="menu menu-distributed">
                <div class="infobox infobox-marginless infobox-copyright">
                    <h4 class="infobox-title infobox-title-secondary-color main-color-emphasized">
                        Copy this as much as you like
                    </h4>
                </div>
                <div class="infobox infobox-marginless infobox-flower">
                    <h4 class="infobox-title infobox-title-secondary-color main-color-emphasized">
                        Flower power
                    </h4>
                </div>
            </div>
        </div>
    </footer>

    <template id="category-template">
        <section class="section secondary-color-bg">
            <div class="centered-container">
                <h1 class="decorated-title font-secondary main-color">
                    <span class="main-color-emphasized">Category name</span>
                    Inventory</h1>
                <div class="separator"></div>
            </div>
            <div class="gallery">
            </div>
        </section>
    </template>

    <template id="product-template">
        <div class="photo-box" data-id="">
            <img class="photo-box-image" src=""></img>
            <div class="photo-box-title font-secondary main-color-emphasized">Product name</div>
            <div class="cart-btn" onclick=""></div>
        </div>
    </template>

    <script>
        /*part 2 begin*/
        let makeCart = function () {
            let counter = document.querySelector("#cart-items");
            counter.textContent = localStorage.getItem('cartStatus');
        }

        let addToCart = function (newItemId) { //call iz buttona
            /*part 2 end*/

            /*lab 2 begin*/
            newItemMapJSON = localStorage.getItem('itemMap');
            newItemMap = new Map(JSON.parse(newItemMapJSON));

            newItemIdNumEntries = newItemMap.get(newItemId);

            if (typeof newItemIdNumEntries !== "undefined") { //ako je item vec bio u cartu
                newItemIdNumEntries++;
                newItemMap.set(newItemId, newItemIdNumEntries);
            } else { //prvi item te vrste
                newItemMap.set(newItemId, 1);
            }

            storeItemMapJSON = JSON.stringify(Array.from(newItemMap.entries()));
            localStorage.setItem('itemMap', storeItemMapJSON);

            //krivo4: broj ispod carta je sada broj key-value parova u mapi, a ne counter buttona
            let number = newItemMap.size;
            localStorage.setItem('cartStatus', number)

            makeCart();
        }

        let makeItemMap = function () {
            //krivo2: itemMap treba samo refreshati, a ne svaki put novi jer onda gubimo cart

            if (typeof localStorage.itemMap !== "undefined") { //ako cart vec postoji
                //NOP
            } else { //ako cart vec postoji
                let itemMap = new Map();
                itemMapJSON = JSON.stringify(Array.from(itemMap.entries()));
                localStorage.setItem('itemMap', itemMapJSON);
            }

        }
        /*lab 2 end*/

        let getData = async function () {
            let response = await fetch("https://wimlab2.azurewebsites.net/categories");
            let data = await response.json();
            addCategories(data);
        }

        let addCategories = async function (categories) {
            let main = document.querySelector('main');
            let categoryTemplate = document.querySelector('#category-template');

            for (let index = 0; index < categories.length; index++) {
                let category = categoryTemplate.content.cloneNode(true);
                let categoryTitleElement = category.querySelector('.decorated-title > span');
                categoryTitleElement.textContent = categories[index].name;

                /*part 1 begin*/
                let Gallery = category.querySelector('.gallery');

                let getProducts = async function () {
                    let productsListJSON = await fetch(
                        "https://wimlab2.azurewebsites.net/products?categoryId=" +
                        (index + 1));
                    let productsList = await productsListJSON.json();
                    addProducts(productsList);
                }

                let addProducts = async function (products) {
                    let productTemplate = document.querySelector('#product-template');

                    for (let indexJ = 0; indexJ < products.length; indexJ++) {
                        let product = productTemplate.content.cloneNode(true);

                        let productPhotoElement = product.querySelector('.photo-box-image');
                        productPhotoElement.src = products[indexJ].imageUrl;

                        let productTitleElement = product.querySelector('.photo-box-title');
                        productTitleElement.textContent = products[indexJ].name;

                        let productButton = product.querySelector('.cart-btn');
                        productButton.value = products[indexJ].id;
                        productButton.setAttribute("onClick",
                            "javascript: addToCart(this.value);");


                        Gallery.appendChild(product);
                    }
                }

                getProducts(); //part 1 call
                /*part 1 end*/

                main.appendChild(category);
            }
        };

        makeCart(); //part 2 call
        makeItemMap(); //lab 2 call
        getData();
    </script>
</body>

</html>
